<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | KeyVault</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background: linear-gradient(135deg, #f5f7fa 0%, #e4e7f1 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .contact-container { width: 100%; max-width: 1200px; display: flex; background: white; border-radius: 20px; box-shadow: 0 15px 50px rgba(0,0,0,0.1); overflow: hidden; min-height: 700px; }

        /* Left Graphic Section */
        .graphic-section { flex: 1; background: linear-gradient(135deg, #5e35b1 0%, #3949ab 100%); display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 60px; color: white; position: relative; overflow: hidden; }
        .graphic-overlay { position: absolute; top:0; left:0; width:100%; height:100%; background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" preserveAspectRatio="none"><path d="M0,0 L100,0 L100,100 Z" fill="rgba(255,255,255,0.05)" /></svg>'); background-size: cover; }
        .graphic-content { max-width: 500px; text-align: center; z-index: 2; }
        .graphic-title { font-size: 36px; font-weight: 700; margin-bottom: 20px; letter-spacing: -0.5px; }
        .graphic-description { font-size: 18px; line-height: 1.6; opacity: 0.9; margin-bottom: 40px; }
        .graphic-icons { display: flex; gap: 20px; justify-content: center; }
        .graphic-icons i { font-size: 32px; }

        /* Right Form Section */
        .form-section { flex: 1; display: flex; flex-direction: column; justify-content: center; padding: 80px; max-width: 600px; }
        .form-header { margin-bottom: 50px; }
        .form-title { font-size: 36px; font-weight: 700; color: #2d3748; margin-bottom: 15px; letter-spacing: -0.5px; }
        .form-subtitle { font-size: 18px; color: #718096; }
        .form-group { margin-bottom: 30px; }
        .form-label { display: block; margin-bottom: 10px; font-weight: 500; color: #4a5568; font-size: 16px; }
        .form-control { width: 100%; padding: 18px 20px; border: 2px solid #e2e8f0; border-radius: 12px; font-size: 16px; transition: all 0.3s ease; height: 60px; }
        .form-control:focus { outline: none; border-color: #5e35b1; box-shadow: 0 0 0 4px rgba(94,53,177,0.1); }
        textarea.form-control { min-height: 140px; resize: vertical; }
        .submit-btn { width: 100%; padding: 20px; background: linear-gradient(135deg, #5e35b1 0%, #3949ab 100%); color: white; border: none; border-radius: 12px; font-size: 18px; font-weight: 600; cursor: pointer; transition: all 0.3s ease; height: 60px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .submit-btn:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(94,53,177,0.3); }

        @media (max-width: 992px) { .contact-container { flex-direction: column; max-width: 700px; } .graphic-section, .form-section { padding: 50px; } }
        @media (max-width: 576px) { .contact-container { min-height: auto; } .graphic-section, .form-section { padding: 40px 20px; } }
    </style>
</head>
<body>

<div class="contact-container">
    <div class="graphic-section">
        <div class="graphic-overlay"></div>
        <div class="graphic-content">
            <h1 class="graphic-title">Get In Touch</h1>
            <p class="graphic-description">Have questions or feedback? Reach out and our support team will get back to you promptly.</p>
            <div class="graphic-icons">
                <i class="fas fa-envelope"></i>
                <i class="fas fa-phone"></i>
                <i class="fas fa-comment-dots"></i>
            </div>
        </div>
    </div>

    <div class="form-section">
        <div class="form-header">
            <h1 class="form-title">Contact Us</h1>
            <p class="form-subtitle">Fill out the form and we'll respond as soon as possible</p>
        </div>

        <form action="contact.php" method="POST">
            <div class="form-group">
                <label class="form-label" for="name">Name</label>
                <input type="text" name="name" id="name" class="form-control" placeholder="Your Name" required>
            </div>

            <div class="form-group">
                <label class="form-label" for="email">Email</label>
                <input type="email" name="email" id="email" class="form-control" placeholder="Your Email" required>
            </div>

            <div class="form-group">
                <label class="form-label" for="message">Message</label>
                <textarea name="message" id="message" class="form-control" placeholder="Type your message..." required></textarea>
            </div>

            <button type="submit" class="submit-btn">
                <i class="fas fa-paper-plane"></i>
                Send Message
            </button>
        </form>
    </div>
</div>

</body>
</html>
