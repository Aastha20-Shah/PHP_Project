  <script>
    // Highlight active nav item
    document.querySelectorAll('.nav-item').forEach(item => {
      item.addEventListener('click', function () {
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        this.classList.add('active');
      });
    });
    function updatePasswordCount() {
  fetch("count_passwords.php")
    .then(res => res.text())
    .then(count => {
      document.getElementById("passwordCount").textContent = count;
    });
}

// Initial load
updatePasswordCount();

// Optional: refresh count every 10s
setInterval(updatePasswordCount, 10000);
fetch('get_user.php')
  .then(res => res.json())
  .then(data => {
    const avatarEl = document.querySelector('.user-avatar');
    if (data.avatar) {
      avatarEl.innerHTML = `<img src="${data.avatar}" style="width:48px;height:48px;border-radius:12px">`;
    } else {
      avatarEl.textContent = data.initials;
    }
    document.querySelector('.user-name').textContent = data.name;
  });
</script>
